<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGuide AI</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <div class="logo">
                <img src="../assets/icons/icon-48.png" alt="SmartGuide" width="32" height="32">
                <h1>SmartGuide AI</h1>
            </div>
            <div id="status-indicator" class="status disconnected">
                <span class="dot"></span>
                <span id="status-text">No API Key</span>
            </div>
        </div>

        <div class="main">
            <div class="toggle-section">
                <label class="toggle">
                    <input type="checkbox" id="enable-toggle" checked>
                    <span class="slider"></span>
                </label>
                <span class="toggle-label">Enable SmartGuide</span>
            </div>

            <div class="api-section">
                <label class="field-label">Groq API Key</label>
                <div class="api-input-row">
                    <input type="password" id="api-key" placeholder="gsk_..." class="api-input">
                    <button id="toggle-visibility" class="btn-icon" title="Show/Hide">
                        <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="#888"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </button>
                </div>
                <p class="field-hint">Get free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a></p>
                <button id="save-key" class="btn primary full-width">Save API Key</button>
            </div>

            <div class="info-section">
                <div class="info-row">
                    <span class="label">API Key:</span>
                    <span id="key-status" class="value">Not Set</span>
                </div>
                <div class="info-row">
                    <span class="label">Model:</span>
                    <span class="value">llama-3.3-70b</span>
                </div>
                <div class="info-row">
                    <span class="label">Version:</span>
                    <span class="value">2.0.0</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Press <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd> to toggle chat</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
