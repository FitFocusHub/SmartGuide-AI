<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGuide AI</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <div class="logo">
                <img src="../assets/icons/icon-48.png" alt="SmartGuide" width="32" height="32">
                <h1>SmartGuide AI</h1>
            </div>
            <div id="status-indicator" class="status disconnected">
                <span class="dot"></span>
                <span id="status-text">Disconnected</span>
            </div>
        </div>

        <div class="main">
            <div class="toggle-section">
                <label class="toggle">
                    <input type="checkbox" id="enable-toggle" checked>
                    <span class="slider"></span>
                </label>
                <span class="toggle-label">Enable SmartGuide</span>
            </div>

            <div class="info-section">
                <div class="info-row">
                    <span class="label">Server:</span>
                    <span id="server-status" class="value">Not Connected</span>
                </div>
                <div class="info-row">
                    <span class="label">Version:</span>
                    <span class="value">1.0.0</span>
                </div>
            </div>

            <div class="actions">
                <button id="connect-btn" class="btn primary">Connect</button>
                <button id="settings-btn" class="btn secondary">Settings</button>
            </div>
        </div>

        <div class="footer">
            <p>Press <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd> to toggle chat</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
